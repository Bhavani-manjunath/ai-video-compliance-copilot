<!DOCTYPE html>
<html>
<head>
<title>AIvya Compliance Copilot</title>
<style>
body{
font-family: Arial;
background:#f4f6fb;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
margin-top:10px;
padding:10px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#4a6cff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#f0f3ff;
padding:15px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>AIvya – AI Video Compliance Copilot</h2>

<p>Paste your video script below:</p>

<textarea id="script"></textarea>

<br>

<button onclick="analyze()">Analyze Script</button>

<div class="result" id="result"></div>

</div>

<script>

async function analyze(){

let script=document.getElementById("script").value

let response=await fetch("http://127.0.0.1:8000/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({script:script})
})

let data=await response.json()

document.getElementById("result").innerHTML=

"<b>Risk Level:</b> "+data.risk_level+"<br><br>"+
"<b>Issues:</b><br>"+data.issues_detected.join("<br>")+"<br><br>"+
"<b>Suggestions:</b><br>"+data.suggested_fixes.join("<br>")

}

</script>

</body>
</html>
